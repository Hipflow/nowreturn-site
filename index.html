<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0a0a0a">
<title>Return — L'essentiel pour méditer</title>
<meta name="description" content="Return est un outil de méditation guidée. Trois mouvements, neuf thèmes, trois exercices de respiration. Cinq minutes par jour suffisent.">

<meta property="og:title" content="Return — L'essentiel pour méditer">
<meta property="og:description" content="Un outil de méditation guidée minimaliste. Trois mouvements, neuf thèmes, trois exercices de respiration.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://nowreturn.app">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
  :root {
    --bg: #0a0a0a;
    --text: #ffffff;
    --muted: #e8eaf0;
    --citation: #ffffff;
    --accent: #818cf8;
    --border: rgba(255, 255, 255, 0.08);
    --surface: rgba(255, 255, 255, 0.03);
  }
  /* Force dark mode partout — pas de switch light */
  html { color-scheme: dark; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Instrument Serif', ui-serif, Georgia, serif;
    font-size: 18px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    min-height: 100vh;
  }
  body {
    display: flex;
    flex-direction: column;
    background-image:
      radial-gradient(circle at 50% 30%, rgba(129, 140, 248, 0.06), transparent 50%),
      radial-gradient(circle at 50% 80%, rgba(100, 108, 200, 0.04), transparent 60%);
  }
  main {
    flex: 1;
    max-width: 560px;
    margin: 0 auto;
    padding: 80px 32px 60px;
    text-align: center;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }
  .logo {
    width: 56px;
    height: 56px;
    margin: 0 auto 56px;
    color: var(--text);
    opacity: 0.92;
  }
  h1 {
    font-family: 'Instrument Serif', serif;
    font-style: italic;
    font-size: 36px;
    font-weight: 400;
    letter-spacing: -0.5px;
    line-height: 1.15;
    color: var(--citation);
    margin-bottom: 28px;
  }
  .lead {
    font-family: 'Instrument Serif', serif;
    color: var(--text);
    font-size: 19px;
    line-height: 1.55;
    margin-bottom: 24px;
    max-width: 440px;
    margin-left: auto;
    margin-right: auto;
  }
  .lead.muted {
    color: var(--muted);
    font-size: 17px;
  }
  .app-store-badge {
    display: inline-block;
    margin-top: 48px;
    transition: opacity 0.3s ease, transform 0.3s ease;
    text-decoration: none;
    line-height: 0;
  }
  .app-store-badge:hover {
    opacity: 0.88;
    transform: translateY(-1px);
  }
  .app-store-badge svg {
    display: block;
    width: 180px;
    height: 60px;
    max-width: 100%;
  }
  .play-soon {
    margin-top: 18px;
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1.8px;
    color: var(--muted);
    opacity: 0.55;
  }
  nav {
    margin-top: 80px;
    padding-top: 36px;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: center;
    gap: 36px;
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 11px;
    font-weight: 400;
    text-transform: uppercase;
    letter-spacing: 1.4px;
  }
  nav a {
    color: var(--muted);
    text-decoration: none;
    transition: color 0.25s ease, opacity 0.25s ease;
    opacity: 0.85;
  }
  nav a:hover {
    color: var(--text);
    opacity: 1;
  }
  footer {
    padding: 32px 24px;
    text-align: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 1.2px;
    text-transform: uppercase;
    opacity: 0.5;
  }
</style>
</head>

  <h1>Revenir à soi,<br>en silence.</h1>

  <p class="lead">Return est un outil de méditation guidée, pensé pour devenir une pratique quotidienne.</p>

  <p class="lead muted">Trois mouvements, neuf thèmes, trois exercices de respiration. Un timer, un suivi. Cinq minutes par jour suffisent.</p>
